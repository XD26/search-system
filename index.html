<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipe Finder</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #f0f7f4 0%, #e0ebe5 100%);
            color: #1a3a32;
            line-height: 1.6;
        }

        /* Header */
        .header {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0,0,0,0.05);
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 20px rgba(0,0,0,0.05);
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 32px;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            flex-wrap: wrap;
            gap: 20px;
        }

        .logo h1 {
            font-size: 32px;
            font-weight: 700;
            color: #2c7a6e;
            letter-spacing: -0.5px;
        }

        .stats-badge {
            display: flex;
            gap: 24px;
        }

        .stat {
            background: #e8f5f2;
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 600;
            color: #2c7a6e;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Search Section */
        .search-section {
            margin: 60px 0 40px;
        }

        .search-tabs {
            display: flex;
            gap: 16px;
            justify-content: center;
            margin-bottom: 40px;
        }

        .tab-btn {
            padding: 16px 36px;
            font-size: 18px;
            font-weight: 600;
            background: white;
            border: none;
            border-radius: 60px;
            cursor: pointer;
            color: #5c8a7e;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
        }

        .tab-btn.active {
            background: linear-gradient(135deg, #2c7a6e, #3ba38e);
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(44, 122, 110, 0.3);
        }

        .tab-btn:hover:not(.active) {
            background: #d4ede6;
            transform: translateY(-1px);
        }

        .search-panel {
            display: none;
            animation: slideUp 0.4s ease;
        }

        .search-panel.active {
            display: block;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .search-card {
            background: white;
            border-radius: 28px;
            padding: 40px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.08);
        }

        .input-group {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .input-group input {
            flex: 1;
            padding: 20px 28px;
            font-size: 20px;
            border: 2px solid #d4ede6;
            border-radius: 60px;
            transition: all 0.3s;
            font-family: inherit;
            background: #fafefe;
        }

        .input-group input:focus {
            outline: none;
            border-color: #3ba38e;
            background: white;
            box-shadow: 0 0 0 4px rgba(59, 163, 142, 0.1);
        }

        .upload-area {
            border: 2px dashed #b8d9d0;
            border-radius: 24px;
            padding: 60px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: #fafefe;
        }

        .upload-area:hover {
            border-color: #3ba38e;
            background: #f0f9f6;
            transform: scale(1.01);
        }

        .upload-icon {
            font-size: 72px;
            margin-bottom: 20px;
        }

        .upload-area p {
            font-size: 20px;
            color: #2c3e50;
            margin-bottom: 12px;
            font-weight: 500;
        }

        .upload-hint {
            font-size: 15px;
            color: #7fa89c;
        }

        .image-preview {
            position: relative;
            margin-top: 28px;
            border-radius: 24px;
            overflow: hidden;
            background: #f0f0f0;
        }

        .image-preview img {
            width: 100%;
            max-height: 400px;
            object-fit: contain;
            display: block;
        }

        .remove-image {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            color: white;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 24px;
            transition: all 0.2s;
            backdrop-filter: blur(4px);
        }

        .remove-image:hover {
            background: rgba(0,0,0,0.9);
            transform: scale(1.1);
        }

        .btn-search {
            background: linear-gradient(135deg, #2c7a6e, #3ba38e);
            color: white;
            border: none;
            padding: 20px 48px;
            font-size: 20px;
            font-weight: 700;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
            white-space: nowrap;
        }

        .btn-search:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(44, 122, 110, 0.35);
        }

        .btn-search:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Results */
        .results-section {
            margin-top: 70px;
            display: none;
        }

        .results-section.visible {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .results-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            flex-wrap: wrap;
            gap: 20px;
            padding-bottom: 24px;
            border-bottom: 2px solid rgba(44, 122, 110, 0.15);
        }

        .results-title {
            font-size: 32px;
            font-weight: 700;
            color: #1a3a32;
        }

        .results-count {
            background: #e8f5f2;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 700;
            margin-left: 16px;
            color: #2c7a6e;
        }

        .clear-btn {
            background: none;
            border: none;
            color: #7fa89c;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            padding: 12px 24px;
            border-radius: 40px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .clear-btn:hover {
            background: #e8f5f2;
            color: #2c7a6e;
        }

        /* Main Recipe */
        .main-recipe {
            background: linear-gradient(135deg, #e8f5f2, #d4ede6);
            border-radius: 36px;
            padding: 48px;
            margin-bottom: 70px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.08);
        }

        .main-recipe-grid {
            display: grid;
            grid-template-columns: 400px 1fr;
            gap: 48px;
        }

        .main-images {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .image-card {
            background: white;
            border-radius: 24px;
            padding: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            transition: transform 0.3s;
        }

        .image-card:hover {
            transform: translateY(-5px);
        }

        .image-label {
            font-size: 14px;
            font-weight: 700;
            color: #2c7a6e;
            margin-bottom: 16px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .image-card img {
            width: 100%;
            height: auto;
            max-height: 280px;
            object-fit: contain;
            border-radius: 16px;
        }

        .main-recipe-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 36px;
        }

        .main-recipe-title {
            font-size: 42px;
            font-weight: 800;
            color: #2c7a6e;
            line-height: 1.2;
        }

        .similarity-badge {
            background: #2c7a6e;
            color: white;
            padding: 10px 24px;
            border-radius: 60px;
            font-size: 18px;
            font-weight: 700;
            box-shadow: 0 6px 14px rgba(44, 122, 110, 0.3);
        }

        .recipe-block {
            background: white;
            border-radius: 24px;
            padding: 28px;
            margin-bottom: 24px;
            transition: all 0.3s;
        }

        .recipe-block:hover {
            transform: translateX(6px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
        }

        .block-title {
            font-weight: 800;
            margin-bottom: 18px;
            color: #2c7a6e;
            font-size: 20px;
            letter-spacing: -0.3px;
        }

        .recipe-text {
            line-height: 1.8;
            white-space: pre-line;
            font-size: 17px;
            color: #2c4a42;
        }

        /* Other Recipes */
        .other-title {
            font-size: 28px;
            font-weight: 700;
            margin: 56px 0 28px;
            color: #1a3a32;
        }

        .recipes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 32px;
            margin-bottom: 150px;
        }

        .recipe-card {
            background: white;
            border-radius: 28px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 8px 20px rgba(0,0,0,0.06);
        }

        .recipe-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 25px 45px rgba(44, 122, 110, 0.15);
        }

        .recipe-card.expanded {
            grid-column: 1 / -1;
            background: linear-gradient(135deg, #f0f9f6, #e8f5f2);
            transform: none;
        }

        .card-image {
            width: 100%;
            height: 260px;
            object-fit: cover;
            transition: transform 0.5s;
        }

        .recipe-card:hover .card-image {
            transform: scale(1.03);
        }

        .card-content {
            padding: 28px;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            gap: 16px;
            margin-bottom: 18px;
        }

        .card-title {
            font-weight: 800;
            font-size: 20px;
            line-height: 1.4;
            flex: 1;
            color: #1a3a32;
        }

        .card-similarity {
            background: #e8f5f2;
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 700;
            color: #2c7a6e;
            white-space: nowrap;
        }

        .card-preview {
            font-size: 16px;
            color: #5c8a7e;
            line-height: 1.7;
            margin-bottom: 18px;
        }

        .card-hint {
            font-size: 14px;
            font-weight: 600;
            color: #2c7a6e;
            text-align: center;
            padding-top: 18px;
            border-top: 1px solid #e0ede8;
            transition: all 0.3s;
        }

        .recipe-card:hover .card-hint {
            color: #3ba38e;
        }

        .card-expanded-content {
            display: none;
            margin-top: 28px;
            padding-top: 28px;
            border-top: 2px solid #c8e0d8;
            animation: slideDown 0.4s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .recipe-card.expanded .card-expanded-content {
            display: block;
        }

        .collapse-btn {
            width: 100%;
            margin-top: 24px;
            padding: 14px;
            background: white;
            border: 1px solid #c8e0d8;
            border-radius: 16px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 700;
            transition: all 0.2s;
            color: #5c8a7e;
        }

        .collapse-btn:hover {
            background: #f0f9f6;
            border-color: #2c7a6e;
            color: #2c7a6e;
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 100px;
            display: none;
        }

        .spinner {
            width: 70px;
            height: 70px;
            border: 4px solid #d4ede6;
            border-top-color: #2c7a6e;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 24px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading p {
            font-size: 20px;
            color: #5c8a7e;
            font-weight: 500;
        }

        .no-results {
            text-align: center;
            padding: 100px;
            color: #7fa89c;
            font-size: 20px;
        }

        .hidden {
            display: none;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1a3a32;
            color: white;
            padding: 16px 32px;
            border-radius: 60px;
            font-size: 16px;
            font-weight: 500;
            z-index: 1000;
            animation: toastInOut 2.5s ease;
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
        }

        @keyframes toastInOut {
            0% { opacity: 0; transform: translateX(-50%) translateY(20px); }
            15% { opacity: 1; transform: translateX(-50%) translateY(0); }
            85% { opacity: 1; transform: translateX(-50%) translateY(0); }
            100% { opacity: 0; transform: translateX(-50%) translateY(-20px); }
        }

        @media (max-width: 768px) {
            .container {
                padding: 0 20px;
            }
            
            .main-recipe-grid {
                grid-template-columns: 1fr;
            }
            
            .main-recipe-title {
                font-size: 32px;
            }
            
            .input-group {
                flex-direction: column;
            }
            
            .btn-search {
                width: 100%;
            }
            
            .recipes-grid {
                grid-template-columns: 1fr;
            }
            
            .search-tabs {
                flex-direction: column;
                align-items: stretch;
            }
            
            .logo h1 {
                font-size: 28px;
            }
            
            .main-recipe {
                padding: 28px;
            }
            
            .search-card {
                padding: 28px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="container">
            <div class="header-content">
                <div class="logo">
                    <h1>Recipe Finder</h1>
                </div>
                <div class="stats-badge" id="stats">
                    <div class="stat">Loading...</div>
                </div>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="search-section">
            <div class="search-tabs">
                <button class="tab-btn active" data-tab="text">Search by Text</button>
                <button class="tab-btn" data-tab="image">Search by Photo</button>
            </div>

            <div id="textPanel" class="search-panel active">
                <div class="search-card">
                    <div class="input-group">
                        <input type="text" id="textQuery" placeholder="e.g., pasta carbonara, chocolate cake, chicken soup" autofocus>
                        <button class="btn-search" id="searchTextBtn">Find Recipes</button>
                    </div>
                </div>
            </div>

            <div id="imagePanel" class="search-panel">
                <div class="search-card">
                    <div class="upload-area" id="uploadArea">
                        <div class="upload-icon">📸</div>
                        <p>Click or drag & drop a photo</p>
                        <div class="upload-hint">JPG, PNG up to 10MB</div>
                        <input type="file" id="imageFile" accept="image/*" hidden>
                    </div>
                    <div id="imagePreview" class="image-preview hidden">
                        <img id="previewImg" alt="Preview">
                        <button class="remove-image" id="removeImageBtn">×</button>
                    </div>
                    <button class="btn-search" id="searchImageBtn" style="margin-top: 28px; width: 100%;" disabled>Find Recipes</button>
                </div>
            </div>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Searching for recipes...</p>
        </div>

        <div class="results-section" id="resultsSection">
            <div class="results-header">
                <div>
                    <span class="results-title" id="resultsTitle">Results</span>
                    <span class="results-count" id="resultsCount">0</span>
                </div>
                <button class="clear-btn" id="clearResultsBtn">Clear all</button>
            </div>
            <div id="mainResult"></div>
            <div id="otherResults"></div>
        </div>
    </div>

    <script>
        let uploadedImageData = null;
        let currentResults = [];

        const $ = id => document.getElementById(id);
        
        function init() {
            loadStats();
            setInterval(loadStats, 30000);
            
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', () => switchTab(btn.dataset.tab));
            });
            
            $('searchTextBtn').addEventListener('click', () => searchByText());
            $('textQuery').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') searchByText();
            });
            
            const uploadArea = $('uploadArea');
            const imageFile = $('imageFile');
            
            uploadArea.addEventListener('click', () => imageFile.click());
            uploadArea.addEventListener('dragover', (e) => {
                e.preventDefault();
                uploadArea.style.borderColor = '#3ba38e';
                uploadArea.style.background = '#f0f9f6';
            });
            uploadArea.addEventListener('dragleave', () => {
                uploadArea.style.borderColor = '#b8d9d0';
                uploadArea.style.background = '#fafefe';
            });
            uploadArea.addEventListener('drop', (e) => {
                e.preventDefault();
                const file = e.dataTransfer.files[0];
                if (file && file.type.startsWith('image/')) handleImageFile(file);
                uploadArea.style.borderColor = '#b8d9d0';
                uploadArea.style.background = '#fafefe';
            });
            
            imageFile.addEventListener('change', (e) => {
                if (e.target.files[0]) handleImageFile(e.target.files[0]);
            });
            
            $('removeImageBtn').addEventListener('click', clearImagePreview);
            $('searchImageBtn').addEventListener('click', () => searchByImage());
            $('clearResultsBtn').addEventListener('click', clearResults);
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.tab === tab);
            });
            
            $('textPanel').classList.toggle('active', tab === 'text');
            $('imagePanel').classList.toggle('active', tab === 'image');
        }

        function handleImageFile(file) {
            if (!file.type.startsWith('image/')) {
                showToast('Please select an image file');
                return;
            }
            
            if (file.size > 10 * 1024 * 1024) {
                showToast('File too large (max 10MB)');
                return;
            }
            
            if (uploadedImageData) URL.revokeObjectURL(uploadedImageData);
            uploadedImageData = URL.createObjectURL(file);
            
            $('uploadArea').classList.add('hidden');
            $('imagePreview').classList.remove('hidden');
            $('previewImg').src = uploadedImageData;
            $('searchImageBtn').disabled = false;
        }

        function clearImagePreview() {
            if (uploadedImageData) URL.revokeObjectURL(uploadedImageData);
            uploadedImageData = null;
            $('uploadArea').classList.remove('hidden');
            $('imagePreview').classList.add('hidden');
            $('imageFile').value = '';
            $('searchImageBtn').disabled = true;
        }

        async function searchByText() {
            const query = $('textQuery').value.trim();
            if (!query) {
                showToast('Please enter a recipe name');
                return;
            }
            await performSearch(`/search/text?q=${encodeURIComponent(query)}&limit=6`, null, query);
        }

        async function searchByImage() {
            if (!uploadedImageData) {
                showToast('Please select an image');
                return;
            }
            
            const file = $('imageFile').files[0];
            if (!file) return;
            
            const formData = new FormData();
            formData.append('file', file);
            await performSearch('/search/image?limit=6', formData, null);
        }

        async function performSearch(url, body, queryText) {
            $('loading').style.display = 'block';
            $('resultsSection').classList.remove('visible');
            
            try {
                const options = body ? { method: 'POST', body } : { method: 'GET' };
                const response = await fetch(url, options);
                
                if (!response.ok) throw new Error('Server error');
                
                const data = await response.json();
                currentResults = data.results || [];
                
                if (currentResults.length === 0) {
                    showToast('No recipes found');
                    $('resultsSection').classList.add('visible');
                    $('mainResult').innerHTML = '<div class="no-results">No recipes found<br><small>Try a different search query or photo</small></div>';
                    $('otherResults').innerHTML = '';
                    $('resultsCount').textContent = '0';
                    $('resultsTitle').textContent = queryText ? `Search: "${queryText}"` : 'Photo Search';
                } else {
                    displayResults(currentResults, queryText);
                }
            } catch (error) {
                console.error(error);
                showToast('Search error. Please try again');
            } finally {
                $('loading').style.display = 'none';
                $('resultsSection').classList.add('visible');
                $('resultsSection').scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        }

        function displayResults(results, queryText) {
            $('resultsCount').textContent = results.length;
            $('resultsTitle').textContent = queryText ? `Search: "${queryText}"` : 'Photo Search';
            
            if (results[0]) {
                $('mainResult').innerHTML = renderMainRecipe(results[0]);
            }
            
            if (results.length > 1) {
                $('otherResults').innerHTML = `
                    <div class="other-title">More Recipes</div>
                    <div class="recipes-grid" id="recipesGrid"></div>
                `;
                const grid = $('recipesGrid');
                grid.innerHTML = results.slice(1).map((r, i) => renderRecipeCard(r, i)).join('');
            } else {
                $('otherResults').innerHTML = '';
            }
        }

        function renderMainRecipe(recipe) {
            const sim = recipe.similarity_percent || Math.round(recipe.similarity * 100);
            return `
                <div class="main-recipe">
                    <div class="main-recipe-grid">
                        <div class="main-images">
                            <div class="image-card">
                                <div class="image-label">Recipe Photo</div>
                                <img src="/recipe-image/${recipe.image_name}" alt="${escapeHtml(recipe.title)}" onerror="this.src='https://via.placeholder.com/400x300?text=No+Image'">
                            </div>
                        </div>
                        <div>
                            <div class="main-recipe-header">
                                <div class="main-recipe-title">${escapeHtml(recipe.title)}</div>
                                <div class="similarity-badge">${sim}% Match</div>
                            </div>
                            <div class="recipe-block">
                                <div class="block-title">Ingredients</div>
                                <div class="recipe-text">${escapeHtml(recipe.ingredients)}</div>
                            </div>
                            <div class="recipe-block">
                                <div class="block-title">Instructions</div>
                                <div class="recipe-text">${escapeHtml(recipe.instructions)}</div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderRecipeCard(recipe, index) {
            const sim = recipe.similarity_percent || Math.round(recipe.similarity * 100);
            return `
                <div class="recipe-card" onclick="toggleCard(this)">
                    <img src="/recipe-image/${recipe.image_name}" class="card-image" alt="${escapeHtml(recipe.title)}" onerror="this.src='https://via.placeholder.com/400x240?text=No+Image'">
                    <div class="card-content">
                        <div class="card-header">
                            <div class="card-title">${index + 2}. ${escapeHtml(recipe.title)}</div>
                            <div class="card-similarity">${sim}%</div>
                        </div>
                        <div class="card-preview">
                            ${escapeHtml(recipe.ingredients.substring(0, 140))}...
                        </div>
                        <div class="card-hint">▼ Click for full recipe</div>
                        <div class="card-expanded-content">
                            <div class="recipe-block" style="margin-bottom: 20px; padding: 24px;">
                                <div class="block-title">Full Ingredients</div>
                                <div class="recipe-text">${escapeHtml(recipe.ingredients)}</div>
                            </div>
                            <div class="recipe-block" style="margin-bottom: 20px; padding: 24px;">
                                <div class="block-title">Instructions</div>
                                <div class="recipe-text">${escapeHtml(recipe.instructions)}</div>
                            </div>
                            <button class="collapse-btn" onclick="event.stopPropagation(); this.closest('.recipe-card').classList.remove('expanded')">Collapse</button>
                        </div>
                    </div>
                </div>
            `;
        }

        function toggleCard(card) {
            document.querySelectorAll('.recipe-card').forEach(c => {
                if (c !== card) c.classList.remove('expanded');
            });
            card.classList.toggle('expanded');
            if (card.classList.contains('expanded')) {
                card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }
        }

        function clearResults() {
            currentResults = [];
            $('resultsSection').classList.remove('visible');
            $('mainResult').innerHTML = '';
            $('otherResults').innerHTML = '';
            $('textQuery').value = '';
            clearImagePreview();
        }

        async function loadStats() {
            try {
                const res = await fetch('/stats');
                const data = await res.json();
                $('stats').innerHTML = `
                    <div class="stat">Recipes: ${data.total || 0}</div>
                    <div class="stat">Indexed: ${data.indexed || 0}</div>
                `;
            } catch(e) {}
        }

        function showToast(msg) {
            const existing = document.querySelector('.toast');
            if (existing) existing.remove();
            
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2500);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        init();
        window.toggleCard = toggleCard;
    </script>
</body>
</html>
